<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="robots" content="noindex, nofollow">
    <meta name="googlebot" content="noindex, nofollow">
    <title>Redirecting...</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #151820;
            color: #fffdf5;
            font-family: Inter, system-ui, sans-serif;
            margin: 0;
        }
        .loader { text-align: center; }
        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(245,151,232,0.2);
            border-top-color: #f597e8;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 16px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="loader">
        <div class="spinner"></div>
        <p>Redirecting you to Yodayo...</p>
    </div>
    <script>
        setTimeout(function() {
            window.location.href = "https://www.ourdreamersai.com/7S8HPQB/3QQG7/";
        }, 2000);
    </script>
    <noscript>
        <p>Please enable JavaScript to continue to Yodayo.</p>
    </noscript>
</body>
</html>
